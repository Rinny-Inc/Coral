version: 2

updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"

    open-pull-requests-limit: 10

    labels:
      - dependencies

    commit-message:
      prefix: "deps"

    groups:
      cargo-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

    labels:
      - ci

    commit-message:
      prefix: "ci"

    groups:
      github-actions:
        patterns:
          - "*"
