name: Update Lines of Code Badge
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
  update-badge:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Install cloc
        run: sudo apt-get update && sudo apt-get install -y cloc
      - name: Calculate LOC
        run: |
          set -euo pipefail
          mkdir -p /tmp/loc-src
          find . -path ./target -prune -o -name '*.rs' -print | while read -r f; do
            rel="${f#./}"
            mkdir -p "/tmp/loc-src/$(dirname "$rel")"
            awk '
              /^[[:space:]]*use[[:space:]]/ { skip=1 }
              skip { if ($0 ~ /;/) skip=0; next }
              { print }
            ' "$f" > "/tmp/loc-src/$rel"
          done
          cloc --csv --include-ext=rs /tmp/loc-src > loc_report.csv
          echo "TOTAL_LOC=$(tail -n 1 loc_report.csv | cut -d',' -f5)" >> "$GITHUB_ENV"
      - name: Publish badge data to badges branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir /tmp/badge-publish && cd /tmp/badge-publish
          cat > line_badge.json << EOF
          {"schemaVersion":1,"label":"Lines of code","message":"${TOTAL_LOC}","color":"orange"}
          EOF
          git init -q -b badges
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add line_badge.json
          git commit -q -m "chore: update LOC badge [skip ci]"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push -q -f origin badges
