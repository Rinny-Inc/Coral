name: Feature request
description: Suggest a feature or improvement for Coral
labels: ["enhancement"]
assignees: iamnoksio
body:
  - type: checkboxes
    id: duplicate
    attributes:
      label: I've searched existing issues and couldn't find a duplicate.
      description: I confirm this is not a duplicate.
      options:
        - label: I confirm this is not a duplicate.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Coral does this feature relate to?
      options:
        - Protocol / Packets
        - World / Chunks
        - Player / Entity
        - Commands
        - Configuration
        - Performance
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is.
      placeholder: "Ex. I'm always frustrated when..."
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: protocol
    attributes:
      label: Relevant protocol details
      description: If applicable, link or describe the relevant 1.8.x protocol behaviour (e.g. wiki.vg page, packet name).
    validations:
      required: false
