name: "Bug report"
description: "Create a bug report to help us improve"
labels: ["bug"]
assignees: iamnoksio
body:
  - type: checkboxes
    id: duplicate
    attributes:
      label: "I've searched existing issues and couldn't find a duplicate."
      description: "I confirm this is not a duplicate."
      options:
        - label: "I confirm this is not a duplicate."
          required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: "What operating system are you using?"
      placeholder: "Example: Ubuntu 22.04"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Server Version/Commit"
      description: "What version or commit of Coral are you running?"
      placeholder: "Example: 0.1.0/a3f92c1"
    validations:
      required: true
  - type: input
    id: mc_version
    attributes:
      label: "Minecraft Client Version"
      description: "What Minecraft client version are you connecting with? (Coral targets 1.8.x)"
      placeholder: "Example: 1.8.9"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: "What happened?"
      description: "A clear and concise description of what the bug is."
    validations:
      required: true
  - type: textarea
    id: to-reproduce
    attributes:
      label: "To Reproduce"
      description: "Steps to reproduce the behavior"
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: "Expected behavior"
      description: "A clear and concise description of what you expected to happen."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Relevant logs or panic output"
      description: "Paste any relevant server logs, stack traces, or panic output here."
      render: text
    validations:
      required: false
